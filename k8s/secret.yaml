# Template de Secret — NUNCA commitar valores reais neste arquivo.
# Antes de aplicar em um cluster real, substitua os placeholders ou gere o
# Secret a partir de variáveis de ambiente/CI, ex.:
#   kubectl create secret generic workshop-os-secret \
#     --from-literal=DB_PASSWORD="$DB_PASSWORD" \
#     --from-literal=APP_KEY="$APP_KEY" \
#     --from-literal=SONAR_TOKEN="$SONAR_TOKEN" \
#     --dry-run=client -o yaml | kubectl apply -f -
apiVersion: v1
kind: Secret
metadata:
  name: workshop-os-secret
type: Opaque
stringData:
  DB_PASSWORD: "CHANGE_ME"
  APP_KEY: "CHANGE_ME"
  SONAR_TOKEN: "CHANGE_ME"
